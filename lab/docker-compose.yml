# SchulSync-Lab: ein wegwerfbarer Samba-AD-DC zum Ausprobieren und Testen.
#
#   docker compose up -d --wait     # Domäne SCHULE.LOCAL hochfahren
#   docker compose down             # alles wieder weg (kein Volume = frische Schule)
#
# Zugangsdaten für das Lab (NUR für das Lab!):
#   Bind:     Administrator@schule.local
#   Passwort: Lab-Kennwort-2026   (Umgebungsvariable SCHULSYNC_LDAP_PASSWORT)
services:
  ad:
    build: .
    container_name: schulsync-lab-ad
    hostname: dc1
    environment:
      ADMIN_PASS: "Lab-Kennwort-2026"
    ports:
      - "127.0.0.1:1389:389"   # LDAP  (STARTTLS)
      - "127.0.0.1:1636:636"   # LDAPS
